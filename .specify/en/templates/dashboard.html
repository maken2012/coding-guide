<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDD Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-number.total { color: var(--text); }
    .stat-number.pending { color: var(--primary); }
    .stat-number.approved { color: var(--success); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* Timeline */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .section-title a {
      float: right;
      font-size: 11px;
      color: var(--primary);
      text-decoration: none;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }

    .section-title a:hover {
      text-decoration: underline;
    }

    .timeline {
      position: relative;
      padding-left: 20px;
      margin-bottom: 4px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border);
    }

    .timeline-entry {
      position: relative;
      padding-bottom: 14px;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--surface);
    }

    .timeline-entry:last-child {
      padding-bottom: 0;
    }

    .timeline-date {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .timeline-text {
      font-size: 13px;
      line-height: 1.4;
    }

    /* Feature list */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .feature-item:hover {
      background: var(--bg);
    }

    .feature-item.active {
      background: var(--bg);
      border-color: var(--primary);
    }

    .feature-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .status-badge.draft { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .status-badge.pending_review { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .status-badge.approved { background: rgba(22,163,74,0.2); color: #16a34a; }
    .status-badge.rejected { background: rgba(220,38,38,0.2); color: #dc2626; }
    .status-badge.implementing { background: rgba(245,158,11,0.2); color: #f59e0b; }

    /* ===== Main content ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      min-height: 56px;
    }

    .content-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .phase-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--primary);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .content-body {
      flex: 1;
      position: relative;
    }

    .content-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Welcome placeholder */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .welcome h3 {
      font-size: 20px;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* ===== Decision panel ===== */
    .decision-panel {
      border-top: 1px solid var(--border);
      background: var(--bg);
      max-height: 300px;
      overflow-y: auto;
    }

    .decision-toggle {
      display: block;
      width: 100%;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      padding: 10px 24px;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .decision-toggle:hover {
      background: var(--surface);
      color: var(--text);
    }

    .decision-list {
      padding: 0 24px 12px;
      display: none;
    }

    .decision-list.open {
      display: block;
    }

    .decision-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }

    .decision-row:last-child {
      border-bottom: none;
    }

    .decision-key {
      color: var(--text-muted);
      min-width: 120px;
      flex-shrink: 0;
    }

    .decision-value {
      color: var(--text);
      word-break: break-word;
    }

    .decision-phase-label {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 0 4px;
    }

    /* ===== Approved card ===== */
    .approved-card {
      background: rgba(22, 163, 74, 0.08);
      border: 1px solid rgba(22, 163, 74, 0.2);
      border-radius: var(--radius-sm);
      padding: 16px 24px;
      text-align: center;
      color: var(--success);
      font-weight: 600;
      font-size: 14px;
    }

    /* ===== Review bar ===== */
    .review-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-bar .feedback-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .review-bar .feedback-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .review-bar .feedback-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .btn-approve { background: var(--success); color: #fff; }
    .btn-reject { background: var(--danger); color: #fff; }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      animation: toast-in 0.3s ease-out;
      max-width: 360px;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #000; }
    .toast.info { background: var(--primary); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-12px); }
    }

    /* ===== Loading ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>SDD Dashboard</h1>
      <p>Specification-Driven Development</p>
    </div>
    <div class="sidebar-content">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number total" id="statTotal">-</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-number pending" id="statPending">-</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-number approved" id="statApproved">-</div>
          <div class="stat-label">Approved</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Timeline -->
      <div class="section-title">
        Timeline
        <a href="/timeline">View full timeline &rarr;</a>
      </div>
      <div class="timeline" id="timeline">
        <div class="loading" style="height:auto;padding:8px 0;">Loading...</div>
      </div>

      <div class="divider"></div>

      <!-- Feature list -->
      <div class="section-title">Features</div>
      <div class="feature-list" id="featureList">
        <div class="loading" style="height:auto;padding:8px 0;">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="content-header" id="contentHeader">
      <h2 id="contentTitle">SDD Dashboard</h2>
      <span class="phase-badge" id="contentPhase" style="display:none;"></span>
    </div>
    <div class="content-body" id="contentBody">
      <div class="welcome" id="welcomePlaceholder">
        <div class="welcome-icon">&#9776;</div>
        <h3>SDD Dashboard</h3>
        <p>Select a feature to view details</p>
      </div>
      <iframe id="contentFrame" style="display:none;"></iframe>
    </div>
    <div class="decision-panel" id="decisionPanel" style="display:none;">
      <button class="decision-toggle" id="decisionToggle" onclick="toggleDecisions()">&#9654; Decisions (0)</button>
      <div class="decision-list" id="decisionList"></div>
    </div>
    <div class="review-bar" id="reviewBar">
      <input type="text" class="feedback-input" id="feedbackInput" placeholder="Enter review feedback...">
      <button class="btn btn-approve" onclick="submitVerdict('approved')">Approve &#10003;</button>
      <button class="btn btn-reject" onclick="submitVerdict('rejected')">Reject &#10007;</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  var API_BASE = window.location.origin;
  var features = [];
  var selectedFeatureId = null;
  var currentPhases = [];
  var currentDecisions = {};
  var decisionsOpen = false;

  /* ===== Status label mapping ===== */
  function statusLabel(status) {
    var map = {
      'draft': 'Draft',
      'pending_review': 'Review',
      'approved': 'Approved',
      'rejected': 'Rejected',
      'implementing': 'In Progress'
    };
    return map[status] || status;
  }

  /* ===== Escape HTML ===== */
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  /* ===== Fetch helper (XHR) ===== */
  function fetchJSON(url, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200) {
        try {
          callback(null, JSON.parse(xhr.responseText));
        } catch (e) {
          callback(e);
        }
      } else {
        callback(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.onerror = function() {
      callback(new Error('Network error'));
    };
    xhr.send();
  }

  /* ===== POST helper ===== */
  function postJSON(url, data, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200) {
        try {
          callback(null, JSON.parse(xhr.responseText));
        } catch (e) {
          callback(null, { ok: true });
        }
      } else {
        try {
          var errBody = JSON.parse(xhr.responseText);
          callback(new Error(errBody.error || 'HTTP ' + xhr.status));
        } catch (e) {
          callback(new Error('HTTP ' + xhr.status));
        }
      }
    };
    xhr.onerror = function() {
      callback(new Error('Cannot connect to server'));
    };
    xhr.send(JSON.stringify(data));
  }

  /* ===== Render stat cards ===== */
  function renderStats(featList) {
    document.getElementById('statTotal').textContent = featList.length;
    document.getElementById('statPending').textContent = featList.filter(function(f) {
      return f.status === 'pending_review';
    }).length;
    document.getElementById('statApproved').textContent = featList.filter(function(f) {
      return f.status === 'approved';
    }).length;
  }

  /* ===== Render timeline ===== */
  function renderTimeline(items) {
    var container = document.getElementById('timeline');
    container.innerHTML = '';
    if (!items || items.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">No events yet</div>';
      return;
    }
    var shown = items.slice(0, 5);
    for (var i = 0; i < shown.length; i++) {
      var entry = shown[i];
      var div = document.createElement('div');
      div.className = 'timeline-entry';
      var dateStr = entry.created_at || entry.date || '';
      var desc = entry.description || entry.event || '';
      div.innerHTML = '<div class="timeline-date">' + escapeHtml(dateStr) + '</div>' +
                      '<div class="timeline-text">' + escapeHtml(desc) + '</div>';
      container.appendChild(div);
    }
  }

  /* ===== Derive feature status from phases ===== */
  function deriveStatus(phases) {
    var phaseOrder = ['spec', 'detail', 'design', 'plan', 'implement', 'review'];
    var lastStarted = '';
    var lastStatus = 'draft';
    for (var i = 0; i < phaseOrder.length; i++) {
      var p = phaseOrder[i];
      var found = null;
      for (var j = 0; j < phases.length; j++) {
        if (phases[j].phase === p) { found = phases[j]; break; }
      }
      if (found && found.status && found.status !== 'not_started') {
        lastStarted = p;
        lastStatus = found.status;
      }
    }
    /* Map phase status to dashboard status */
    if (lastStatus === 'in_progress' || lastStatus === 'implementing') return 'implementing';
    if (lastStatus === 'pending_review' || lastStatus === 'review') return 'pending_review';
    if (lastStatus === 'approved' || lastStatus === 'reviewed') return 'approved';
    if (lastStatus === 'rejected') return 'rejected';
    return 'draft';
  }

  /* ===== Derive current active phase and artifact ===== */
  function deriveActivePhase(phases) {
    var phaseOrder = ['spec', 'detail', 'design', 'plan', 'implement', 'review'];
    var result = { phase: '', artifact: '' };
    for (var i = 0; i < phaseOrder.length; i++) {
      var p = phaseOrder[i];
      var found = null;
      for (var j = 0; j < phases.length; j++) {
        if (phases[j].phase === p) { found = phases[j]; break; }
      }
      if (found && found.status && found.status !== 'not_started') {
        result.phase = p;
        result.artifact = found.artifact_path || (p + '.html');
      }
    }
    return result;
  }

  /* ===== Render feature list ===== */
  function renderFeatureList(featList) {
    var container = document.getElementById('featureList');
    container.innerHTML = '';
    if (featList.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">No features yet</div>';
      return;
    }
    for (var i = 0; i < featList.length; i++) {
      var feature = featList[i];
      var item = document.createElement('div');
      item.className = 'feature-item';
      item.setAttribute('data-feature-id', feature.id);
      item.onclick = (function(fid) {
        return function() { selectFeature(fid); };
      })(feature.id);
      item.innerHTML = '<span class="feature-name">' + escapeHtml(feature.name || feature.id) + '</span>' +
                       '<span class="status-badge ' + feature.status + '">' + statusLabel(feature.status) + '</span>';
      container.appendChild(item);
    }
  }

  /* ===== Select a feature ===== */
  function selectFeature(featureId) {
    selectedFeatureId = featureId;

    /* Find feature */
    var feature = null;
    for (var i = 0; i < features.length; i++) {
      if (features[i].id === featureId) { feature = features[i]; break; }
    }
    if (!feature) return;

    /* Update sidebar active state */
    var items = document.querySelectorAll('.feature-item');
    for (var i = 0; i < items.length; i++) {
      var id = items[i].getAttribute('data-feature-id');
      if (id === featureId) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    /* Update header */
    document.getElementById('contentTitle').textContent = feature.name || feature.id;

    /* Fetch phases for this feature */
    fetchJSON(API_BASE + '/api/phases/' + featureId, function(err, phases) {
      if (err || !phases) phases = [];
      currentPhases = phases;
      var status = deriveStatus(phases);
      var active = deriveActivePhase(phases);

      /* Update header badge */
      var phaseEl = document.getElementById('contentPhase');
      if (active.phase) {
        phaseEl.textContent = active.phase;
        phaseEl.style.display = '';
      } else {
        phaseEl.style.display = 'none';
      }

      /* Load content */
      if (active.artifact) {
        var artifactPath = featureId + '/' + active.artifact;
        loadContent(artifactPath);
      } else {
        showWelcome(feature.name + ' — No phase started yet');
      }

      /* Fetch decisions */
      fetchJSON(API_BASE + '/api/decisions/' + featureId, function(err2, decisions) {
        if (err2 || !decisions) decisions = {};
        currentDecisions = decisions;
        renderDecisions(decisions);
      });
    });
  }

  /* ===== Load content into iframe ===== */
  function loadContent(artifactPath) {
    var welcome = document.getElementById('welcomePlaceholder');
    var frame = document.getElementById('contentFrame');
    var reviewBar = document.getElementById('reviewBar');
    var decisionPanel = document.getElementById('decisionPanel');
    welcome.style.display = 'none';
    frame.style.display = 'block';
    frame.src = '/specs/' + artifactPath;
    reviewBar.style.display = 'flex';
    decisionPanel.style.display = 'block';

    /* Hide review bar when iframe loads (if it has own review bar) */
    frame.onload = function() {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        var bar = doc.querySelector('.review-bar');
        if (bar) {
          reviewBar.style.display = 'none';
        }
        /* Also check if the iframe page shows an approved state */
        var approvedEl = doc.querySelector('.approved-card');
        if (approvedEl) {
          showApprovedCard();
          reviewBar.style.display = 'none';
        }
      } catch (e) {
        /* cross-origin, ignore */
      }
    };
  }

  /* ===== Show welcome placeholder ===== */
  function showWelcome(message) {
    var welcome = document.getElementById('welcomePlaceholder');
    var frame = document.getElementById('contentFrame');
    var reviewBar = document.getElementById('reviewBar');
    var decisionPanel = document.getElementById('decisionPanel');
    frame.style.display = 'none';
    welcome.style.display = 'flex';
    reviewBar.style.display = 'flex';
    decisionPanel.style.display = 'none';
    if (message) {
      welcome.querySelector('p').textContent = message;
    }
  }

  /* ===== Show approved card in content area ===== */
  function showApprovedCard() {
    var frame = document.getElementById('contentFrame');
    frame.style.display = 'none';
    var welcome = document.getElementById('welcomePlaceholder');
    welcome.style.display = 'flex';
    welcome.innerHTML = '<div class="approved-card">&#10003; Approved</div>';
  }

  /* ===== Render decisions panel ===== */
  function renderDecisions(decisions) {
    var count = 0;
    var html = '';
    var phases = Object.keys(decisions).sort();
    for (var pi = 0; pi < phases.length; pi++) {
      var phase = phases[pi];
      var items = decisions[phase];
      if (!items || items.length === 0) continue;
      html += '<div class="decision-phase-label">' + escapeHtml(phase) + '</div>';
      for (var i = 0; i < items.length; i++) {
        var d = items[i];
        var val = d.value || '';
        /* Try to parse multi-select values */
        try {
          var parsed = JSON.parse(val);
          if (Array.isArray(parsed)) val = parsed.join(', ');
        } catch (e) { /* not JSON, use as-is */ }
        html += '<div class="decision-row">' +
          '<span class="decision-key">' + escapeHtml(d.key || '') + '</span>' +
          '<span class="decision-value">' + escapeHtml(val) + '</span>' +
        '</div>';
        count++;
      }
    }

    var toggle = document.getElementById('decisionToggle');
    toggle.innerHTML = '&#9654; Decisions (' + count + ')';

    var list = document.getElementById('decisionList');
    if (count === 0) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">No decisions recorded</div>';
    } else {
      list.innerHTML = html;
    }

    /* Preserve open state */
    if (decisionsOpen) {
      list.classList.add('open');
      toggle.innerHTML = '&#9660; Decisions (' + count + ')';
    }
  }

  /* ===== Toggle decisions panel ===== */
  function toggleDecisions() {
    var list = document.getElementById('decisionList');
    var toggle = document.getElementById('decisionToggle');
    decisionsOpen = !decisionsOpen;
    if (decisionsOpen) {
      list.classList.add('open');
      var count = list.querySelectorAll('.decision-row').length;
      toggle.innerHTML = '&#9660; Decisions (' + count + ')';
    } else {
      list.classList.remove('open');
      var count = list.querySelectorAll('.decision-row').length;
      toggle.innerHTML = '&#9654; Decisions (' + count + ')';
    }
  }

  /* ===== Submit verdict ===== */
  function submitVerdict(verdict) {
    if (!selectedFeatureId) {
      showToast('Select a feature first', 'warning');
      return;
    }
    var feedback = document.getElementById('feedbackInput').value.trim();
    var active = deriveActivePhase(currentPhases);
    var phase = active.phase || 'spec';

    var data = {
      feature_id: selectedFeatureId,
      phase: phase,
      verdict: verdict,
      feedback: feedback,
      decisions: {},
      timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19)
    };

    postJSON(API_BASE + '/api/feedback', data, function(err, resp) {
      if (err) {
        var msg = err.message || 'Submission failed';
        if (msg.indexOf('Network') !== -1 || msg.indexOf('connect') !== -1) {
          showToast('Cannot connect to server', 'error');
        } else {
          showToast(msg, 'error');
        }
        return;
      }
      if (verdict === 'approved') {
        showToast('Approved', 'success');
      } else {
        showToast('Rejected', 'error');
      }
      /* Refresh data */
      loadFeatures();
    });
  }

  /* ===== Show toast notification ===== */
  function showToast(msg, type) {
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(function() {
      toast.style.animation = 'toast-out 0.3s ease-in forwards';
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }, 3500);
  }

  /* ===== Load features from API ===== */
  function loadFeatures() {
    fetchJSON(API_BASE + '/api/features', function(err, data) {
      if (err) {
        document.getElementById('featureList').innerHTML =
          '<div style="font-size:12px;color:var(--text-muted);">Cannot connect to server</div>';
        return;
      }
      if (!data) data = [];

      /* Derive status for each feature from phases */
      var pending = data.length;
      var loaded = 0;

      if (data.length === 0) {
        features = [];
        renderStats(features);
        renderFeatureList(features);
        return;
      }

      for (var i = 0; i < data.length; i++) {
        (function(idx) {
          fetchJSON(API_BASE + '/api/phases/' + data[idx].id, function(err2, phases) {
            loaded++;
            if (err2 || !phases) phases = [];
            data[idx].status = deriveStatus(phases);
            data[idx]._phases = phases;

            if (loaded === pending) {
              features = data;
              renderStats(features);
              renderFeatureList(features);

              /* Re-select current feature if any */
              if (selectedFeatureId) {
                selectFeature(selectedFeatureId);
              }
            }
          });
        })(i);
      }
    });
  }

  /* ===== Initialize ===== */
  function init() {
    /* Load features first */
    fetchJSON(API_BASE + '/api/features', function(err, data) {
      if (err) {
        document.getElementById('featureList').innerHTML =
          '<div style="font-size:12px;color:var(--text-muted);">Cannot connect to server</div>';
        document.getElementById('timeline').innerHTML =
          '<div style="font-size:12px;color:var(--text-muted);">Cannot connect to server</div>';
        return;
      }
      if (!data) data = [];

      /* Derive status for each feature */
      var pending = data.length;
      var loaded = 0;

      if (data.length === 0) {
        features = [];
        renderStats(features);
        renderFeatureList(features);
        /* Still load timeline */
        loadTimeline();
        return;
      }

      for (var i = 0; i < data.length; i++) {
        (function(idx) {
          fetchJSON(API_BASE + '/api/phases/' + data[idx].id, function(err2, phases) {
            loaded++;
            if (err2 || !phases) phases = [];
            data[idx].status = deriveStatus(phases);
            data[idx]._phases = phases;

            if (loaded === pending) {
              features = data;
              renderStats(features);
              renderFeatureList(features);

              /* Auto-select first feature */
              if (features.length > 0) {
                selectFeature(features[0].id);
              }
            }
          });
        })(i);
      }

      /* Load timeline in parallel */
      loadTimeline();
    });
  }

  /* ===== Load timeline ===== */
  function loadTimeline() {
    fetchJSON(API_BASE + '/api/timeline?limit=5', function(err, data) {
      if (err || !data) {
        document.getElementById('timeline').innerHTML =
          '<div style="font-size:12px;color:var(--text-muted);">No events yet</div>';
        return;
      }
      renderTimeline(data.items || []);
    });
  }

  /* ===== Listen for messages from iframe ===== */
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'status') {
      showToast('Frame status: ' + event.data.message, 'info');
    }
  });

  /* Start */
  init();
</script>

</body>
</html>
