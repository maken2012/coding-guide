<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="phase" content="">
  <meta name="created" content="">
  <title>Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-number.total { color: var(--text); }
    .stat-number.pending { color: var(--primary); }
    .stat-number.implementing { color: var(--warning); }
    .stat-number.done { color: var(--success); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* Timeline */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .timeline {
      position: relative;
      padding-left: 20px;
      margin-bottom: 4px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border);
    }

    .timeline-entry {
      position: relative;
      padding-bottom: 14px;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--surface);
    }

    .timeline-entry:last-child {
      padding-bottom: 0;
    }

    .timeline-date {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .timeline-text {
      font-size: 13px;
      line-height: 1.4;
    }

    /* Feature list */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .feature-item:hover {
      background: var(--bg);
    }

    .feature-item.active {
      background: var(--bg);
      border-color: var(--primary);
    }

    .feature-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .status-badge.draft { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .status-badge.pending_review { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .status-badge.approved { background: rgba(22,163,74,0.2); color: #16a34a; }
    .status-badge.rejected { background: rgba(220,38,38,0.2); color: #dc2626; }
    .status-badge.implementing { background: rgba(245,158,11,0.2); color: #f59e0b; }

    /* ===== Main content ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      min-height: 56px;
    }

    .content-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .phase-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--primary);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .content-body {
      flex: 1;
      position: relative;
    }

    .content-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Welcome placeholder */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .welcome h3 {
      font-size: 20px;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* ===== Review bar ===== */
    .review-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-bar .feedback-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .review-bar .feedback-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .review-bar .feedback-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .btn-approve { background: var(--success); color: #fff; }
    .btn-reject { background: var(--danger); color: #fff; }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      animation: toast-in 0.3s ease-out;
      max-width: 360px;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #000; }
    .toast.info { background: var(--primary); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-12px); }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Feature Dashboard</h1>
      <p>Feature Development Kanban Board</p>
    </div>
    <div class="sidebar-content">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number total" id="statTotal">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-number pending" id="statPending">0</div>
          <div class="stat-label">Pending Review</div>
        </div>
        <div class="stat-card">
          <div class="stat-number implementing" id="statImplementing">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-number done" id="statDone">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Timeline -->
      <div class="section-title">Timeline</div>
      <div class="timeline" id="timeline">
        <!-- Rendered by JS -->
      </div>

      <div class="divider"></div>

      <!-- Feature list -->
      <div class="section-title">Features</div>
      <div class="feature-list" id="featureList">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="content-header" id="contentHeader">
      <h2 id="contentTitle">Dashboard</h2>
      <span class="phase-badge" id="contentPhase" style="display:none;"></span>
    </div>
    <div class="content-body" id="contentBody">
      <div class="welcome" id="welcomePlaceholder">
        <div class="welcome-icon">&#9776;</div>
        <h3>Welcome to Feature Dashboard</h3>
        <p>Select a feature from the sidebar to view its details and current phase document.</p>
      </div>
      <iframe id="contentFrame" style="display:none;"></iframe>
    </div>
    <div class="review-bar">
      <input type="text" class="feedback-input" id="feedbackInput" placeholder="Enter review feedback...">
      <button class="btn btn-approve" onclick="submitVerdict('approved')">Approve ✓</button>
      <button class="btn btn-reject" onclick="submitVerdict('rejected')">Reject ✗</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Embedded state -->
<script type="application/json" id="dashboardState">
{
  "current_feature": "",
  "features": [
    {
      "id": "F001",
      "name": "User Authentication Module",
      "status": "implementing",
      "phase": "tasks",
      "html_path": "tasks-template.html"
    },
    {
      "id": "F002",
      "name": "Data Export Feature",
      "status": "pending_review",
      "phase": "spec",
      "html_path": "spec-template.html"
    },
    {
      "id": "F003",
      "name": "Permission Management System",
      "status": "approved",
      "phase": "plan",
      "html_path": "plan-template.html"
    },
    {
      "id": "F004",
      "name": "Audit Log",
      "status": "draft",
      "phase": "",
      "html_path": ""
    }
  ],
  "timeline": [
    { "date": "2025-01-15", "event": "F001 spec approved" },
    { "date": "2025-01-18", "event": "F001 technical design submitted" },
    { "date": "2025-01-22", "event": "F002 spec created" },
    { "date": "2025-01-25", "event": "F001 entered implementation phase" },
    { "date": "2025-01-28", "event": "F003 spec created" }
  ]
}
</script>

<script>
  var state = null;
  var selectedFeatureId = null;

  /**
   * Initialize dashboard: read embedded state and render sidebar.
   */
  function init() {
    state = JSON.parse(document.getElementById('dashboardState').textContent);
    renderStats(state.features);
    renderTimeline(state.timeline);
    renderFeatureList(state.features);

    if (state.current_feature) {
      selectFeature(state.current_feature);
    }
  }

  /**
   * Update stat card numbers.
   */
  function renderStats(features) {
    document.getElementById('statTotal').textContent = features.length;
    document.getElementById('statPending').textContent = features.filter(function(f) { return f.status === 'pending_review'; }).length;
    document.getElementById('statImplementing').textContent = features.filter(function(f) { return f.status === 'implementing'; }).length;
    document.getElementById('statDone').textContent = features.filter(function(f) { return f.status === 'approved' || f.status === 'done'; }).length;
  }

  /**
   * Render timeline entries.
   */
  function renderTimeline(timeline) {
    var container = document.getElementById('timeline');
    container.innerHTML = '';
    timeline.forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'timeline-entry';
      div.innerHTML = '<div class="timeline-date">' + escapeHtml(entry.date) + '</div>' +
                      '<div class="timeline-text">' + escapeHtml(entry.event) + '</div>';
      container.appendChild(div);
    });
  }

  /**
   * Render clickable feature list.
   */
  function renderFeatureList(features) {
    var container = document.getElementById('featureList');
    container.innerHTML = '';
    features.forEach(function(feature) {
      var item = document.createElement('div');
      item.className = 'feature-item';
      item.setAttribute('data-feature-id', feature.id);
      item.onclick = function() { selectFeature(feature.id); };
      item.innerHTML = '<span class="feature-name">' + escapeHtml(feature.name) + '</span>' +
                       '<span class="status-badge ' + feature.status + '">' + statusLabel(feature.status) + '</span>';
      container.appendChild(item);
    });
  }

  /**
   * Select a feature and load its content.
   */
  function selectFeature(featureId) {
    selectedFeatureId = featureId;
    var feature = state.features.find(function(f) { return f.id === featureId; });
    if (!feature) return;

    // Update sidebar active state
    document.querySelectorAll('.feature-item').forEach(function(el) {
      el.classList.toggle('active', el.getAttribute('data-feature-id') === featureId);
    });

    // Update header
    document.getElementById('contentTitle').textContent = feature.name;

    var phaseEl = document.getElementById('contentPhase');
    if (feature.phase) {
      phaseEl.textContent = feature.phase;
      phaseEl.style.display = '';
    } else {
      phaseEl.style.display = 'none';
    }

    // Load content
    if (feature.html_path) {
      loadContent(feature.html_path);
    } else {
      showWelcome(feature.name + ' — No phase has been started yet');
    }
  }

  /**
   * Load content into the iframe.
   */
  function loadContent(htmlPath) {
    var welcome = document.getElementById('welcomePlaceholder');
    var frame = document.getElementById('contentFrame');
    welcome.style.display = 'none';
    frame.style.display = 'block';
    frame.src = htmlPath;
  }

  /**
   * Show the welcome placeholder with optional message.
   */
  function showWelcome(message) {
    var welcome = document.getElementById('welcomePlaceholder');
    var frame = document.getElementById('contentFrame');
    frame.style.display = 'none';
    welcome.style.display = 'flex';
    if (message) {
      welcome.querySelector('p').textContent = message;
    }
  }

  /**
   * Send verdict to the iframe via postMessage.
   */
  function submitVerdict(verdict) {
    var feedback = document.getElementById('feedbackInput').value.trim();
    var frame = document.getElementById('contentFrame');

    var data = {
      type: 'verdict',
      verdict: verdict,
      feedback: feedback,
      featureId: selectedFeatureId,
      timestamp: new Date().toISOString()
    };

    // Send to iframe
    if (frame.contentWindow) {
      frame.contentWindow.postMessage(data, '*');
    }

    showToast('Verdict "' + verdict + '" sent for ' + (selectedFeatureId || 'unknown'), verdict === 'approved' ? 'success' : 'error');

    // Also save locally
    saveFeedback(data);
  }

  /**
   * Save feedback data (file or clipboard).
   */
  async function saveFeedback(data) {
    var json = JSON.stringify(data, null, 2);

    if (window.showSaveFilePicker) {
      try {
        var handle = await window.showSaveFilePicker({
          suggestedName: 'feedback-' + data.featureId + '-' + Date.now() + '.json',
          types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
        });
        var writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        showToast('Feedback saved to file.', 'success');
        return;
      } catch (err) {
        if (err.name === 'AbortError') { return; }
      }
    }

    try {
      await navigator.clipboard.writeText(json);
      showToast('Feedback copied to clipboard.', 'info');
    } catch (err) {
      console.log('Feedback data:', json);
    }
  }

  /**
   * Show a toast notification.
   */
  function showToast(msg, type) {
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = msg;
    container.appendChild(toast);

    setTimeout(function() {
      toast.style.animation = 'toast-out 0.3s ease-in forwards';
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }, 3500);
  }

  /**
   * Get human-readable status label.
   */
  function statusLabel(status) {
    var map = {
      'draft': 'Draft',
      'pending_review': 'Review',
      'approved': 'Approved',
      'rejected': 'Rejected',
      'implementing': 'WIP'
    };
    return map[status] || status;
  }

  /**
   * Escape HTML entities.
   */
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Listen for messages from iframe
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'status') {
      showToast('Frame status: ' + event.data.message, 'info');
    }
  });

  // Initialize on load
  init();
</script>

</body>
</html>
