<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="phase" content="plan">
  <meta name="created" content="">
  <title>Prototype - Animation Sandbox</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      padding: 32px 24px 120px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 15px;
    }

    .sandbox {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Preview Area */
    .preview-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .preview-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.06) 0%, transparent 70%);
    }

    /* Checkmark animation */
    .checkmark-svg {
      width: 80px;
      height: 80px;
      position: relative;
      z-index: 1;
    }

    .checkmark-circle {
      stroke: var(--primary);
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      transform-origin: center;
    }

    .checkmark-check {
      stroke: var(--success);
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .animating .checkmark-circle {
      animation: draw-circle var(--anim-duration, 0.6s) var(--anim-easing, ease) forwards;
    }

    .animating .checkmark-check {
      animation: draw-check var(--anim-duration, 0.6s) var(--anim-easing, ease) forwards;
      animation-delay: calc(var(--anim-duration, 0.6s) * 0.5);
    }

    @keyframes draw-circle {
      to { stroke-dashoffset: 0; }
    }

    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    /* Spinner alternative */
    .spinner-el {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      display: none;
      position: relative;
      z-index: 1;
    }

    .animating .spinner-el {
      animation: spin var(--anim-duration, 0.6s) var(--anim-easing, ease) infinite;
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Controls */
    .controls-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .control-row:last-child {
      margin-bottom: 0;
    }

    .control-label {
      font-size: 13px;
      font-weight: 600;
      min-width: 90px;
      color: var(--text-muted);
    }

    .control-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      outline: none;
    }

    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--primary);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .control-row input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .control-value {
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      min-width: 50px;
      text-align: right;
    }

    .control-row select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .control-row select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    /* Animation type selector */
    .anim-type-btns {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .anim-type-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .anim-type-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .anim-type-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Review bar */
    .review-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .review-bar .feedback-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .review-bar .feedback-input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .review-bar .feedback-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-approve { background: var(--success); color: #fff; }
    .btn-reject { background: var(--danger); color: #fff; }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      animation: toast-in 0.3s ease-out;
      max-width: 360px;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #000; }
    .toast.info { background: var(--primary); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-12px); }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Animation Sandbox</h1>
    <p>Tweak duration and easing, then hit Play to preview the animation.</p>
  </div>

  <!-- SLOT:content -->

  <div class="sandbox">
    <!-- Preview -->
    <div class="preview-area" id="previewArea">
      <svg class="checkmark-svg" id="checkmarkSvg" viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="24"/>
        <path class="checkmark-check" d="M14 27l7 7 16-16"/>
      </svg>
      <div class="spinner-el" id="spinnerEl"></div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
      <div class="control-row">
        <span class="control-label">Animation</span>
        <div class="anim-type-btns" id="animTypeBtns">
          <button class="anim-type-btn active" data-type="checkmark">Checkmark</button>
          <button class="anim-type-btn" data-type="spinner">Spinner</button>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Duration</span>
        <input type="range" id="durationSlider" min="100" max="3000" value="600" step="50">
        <span class="control-value" id="durationValue">0.6s</span>
      </div>

      <div class="control-row">
        <span class="control-label">Easing</span>
        <select id="easingSelect">
          <option value="ease">ease</option>
          <option value="ease-in">ease-in</option>
          <option value="ease-out">ease-out</option>
          <option value="ease-in-out">ease-in-out</option>
          <option value="linear">linear</option>
          <option value="cubic-bezier(0.68,-0.55,0.27,1.55)">bounce</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="playBtn">Play</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

  <!-- END SLOT -->

  <div class="toast-container" id="toastContainer"></div>

  <div class="review-bar">
    <input type="text" class="feedback-input" id="feedbackInput" placeholder="Enter review feedback...">
    <button class="btn btn-approve" onclick="submitVerdict('approved')">Approve</button>
    <button class="btn btn-reject" onclick="submitVerdict('rejected')">Reject</button>
  </div>

  <script>
    var previewArea = document.getElementById('previewArea');
    var checkmarkSvg = document.getElementById('checkmarkSvg');
    var spinnerEl = document.getElementById('spinnerEl');
    var durationSlider = document.getElementById('durationSlider');
    var durationValue = document.getElementById('durationValue');
    var easingSelect = document.getElementById('easingSelect');
    var currentType = 'checkmark';

    // Duration slider update
    durationSlider.addEventListener('input', function() {
      durationValue.textContent = (this.value / 1000).toFixed(1) + 's';
    });

    // Animation type toggle
    document.getElementById('animTypeBtns').addEventListener('click', function(e) {
      var btn = e.target.closest('.anim-type-btn');
      if (!btn) return;
      this.querySelectorAll('.anim-type-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentType = btn.dataset.type;
      resetAnimation();
    });

    // Play
    document.getElementById('playBtn').addEventListener('click', playAnimation);

    // Reset
    document.getElementById('resetBtn').addEventListener('click', resetAnimation);

    function playAnimation() {
      resetAnimation();

      var duration = durationSlider.value + 'ms';
      var easing = easingSelect.value;

      previewArea.style.setProperty('--anim-duration', duration);
      previewArea.style.setProperty('--anim-easing', easing);

      if (currentType === 'checkmark') {
        checkmarkSvg.style.display = '';
        spinnerEl.style.display = 'none';
      } else {
        checkmarkSvg.style.display = 'none';
        spinnerEl.style.display = '';
        spinnerEl.style.display = 'block';
      }

      // Force reflow
      void previewArea.offsetWidth;
      previewArea.classList.add('animating');
    }

    function resetAnimation() {
      previewArea.classList.remove('animating');
      previewArea.style.removeProperty('--anim-duration');
      previewArea.style.removeProperty('--anim-easing');

      if (currentType === 'checkmark') {
        checkmarkSvg.style.display = '';
        spinnerEl.style.display = 'none';
      } else {
        checkmarkSvg.style.display = 'none';
        spinnerEl.style.display = '';
      }
    }

    // --- Feedback & Review ---
    async function submitVerdict(verdict) {
      var feedback = document.getElementById('feedbackInput').value.trim();
      var data = {
        verdict: verdict,
        timestamp: new Date().toISOString(),
        feedback: feedback,
        animation: {
          type: currentType,
          duration: durationSlider.value + 'ms',
          easing: easingSelect.value
        }
      };
      await saveFeedback(data);
    }

    async function saveFeedback(data) {
      var json = JSON.stringify(data, null, 2);
      if (window.showSaveFilePicker) {
        try {
          var handle = await window.showSaveFilePicker({
            suggestedName: 'feedback-' + Date.now() + '.json',
            types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
          });
          var writable = await handle.createWritable();
          await writable.write(json);
          await writable.close();
          showToast('Feedback saved to file.', 'success');
          return;
        } catch (err) {
          if (err.name === 'AbortError') { showToast('Save cancelled.', 'warning'); return; }
        }
      }
      try {
        await navigator.clipboard.writeText(json);
        showToast('Feedback copied to clipboard.', 'info');
      } catch (err) {
        showToast('Could not save or copy feedback.', 'error');
        console.log('Feedback data:', json);
      }
    }

    function showToast(msg, type) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast ' + (type || 'info');
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(function() {
        toast.style.animation = 'toast-out 0.3s ease-in forwards';
        setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
      }, 3500);
    }
  </script>

</body>
</html>
