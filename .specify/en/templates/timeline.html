<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDD Timeline</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray: #64748b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .back-link:hover {
      opacity: 0.8;
    }

    .sidebar-section {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 0 16px 8px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
      color: var(--text-muted);
    }

    .feature-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .feature-item.active {
      color: var(--text);
      background: rgba(59, 130, 246, 0.1);
    }

    .feature-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
      flex-shrink: 0;
    }

    .feature-item.active .feature-dot {
      background: var(--primary);
    }

    .feature-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .main-header h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .event-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .timeline-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    /* ===== Timeline Event Row ===== */
    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      position: relative;
    }

    .event-row + .event-row {
      border-top: 1px solid rgba(51, 65, 85, 0.5);
    }

    .event-time {
      width: 160px;
      min-width: 160px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .event-dot-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      min-width: 20px;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-dot.approved { background: var(--success); }
    .event-dot.rejected { background: var(--danger); }
    .event-dot.started  { background: var(--primary); }
    .event-dot.other    { background: var(--gray); }

    .event-body {
      flex: 1;
      min-width: 0;
    }

    .event-desc {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .event-feature-tag {
      display: inline-block;
      font-size: 11px;
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 8px;
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state-text {
      font-size: 15px;
    }

    /* ===== Load More ===== */
    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding: 24px 0 32px;
    }

    .load-more-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 32px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .load-more-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--text-muted);
    }

    .load-more-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ===== Loading ===== */
    .loading-indicator {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>SDD Timeline</h1>
        <a class="back-link" href="/">&larr; Back to Dashboard</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Filter by Feature</div>
        <div id="feature-list">
          <div class="feature-item active" data-feature-id="" onclick="selectFeature('')">
            <span class="feature-dot"></span>
            <span class="feature-name">All</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="main-header">
        <h2>Event Timeline</h2>
        <span class="event-count" id="event-count"></span>
      </div>
      <div class="timeline-container" id="timeline-container">
        <div class="loading-indicator" id="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    var API_BASE = window.location.origin;
    var currentPage = 1;
    var perPage = 50;
    var selectedFeatureId = '';
    var totalEvents = 0;
    var features = [];

    /* ===== Color mapping ===== */
    function dotClass(eventType) {
      var t = (eventType || '').toLowerCase();
      if (t.indexOf('approved') !== -1) return 'approved';
      if (t.indexOf('rejected') !== -1) return 'rejected';
      if (t.indexOf('started') !== -1) return 'started';
      return 'other';
    }

    /* ===== Escape HTML ===== */
    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    /* ===== Fetch helpers ===== */
    function fetchJSON(url, cb) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status === 200) {
          try {
            cb(null, JSON.parse(xhr.responseText));
          } catch (e) {
            cb(e);
          }
        } else {
          cb(new Error('HTTP ' + xhr.status));
        }
      };
      xhr.send();
    }

    /* ===== Render a single event row ===== */
    function renderEvent(ev) {
      var cls = dotClass(ev.event_type);
      var featureTag = '';
      if (ev.feature_id && features.length > 0) {
        featureTag = '<span class="event-feature-tag">' + esc(ev.feature_id) + '</span>';
      }
      return '<div class="event-row">' +
        '<div class="event-time">' + esc(ev.created_at) + '</div>' +
        '<div class="event-dot-wrap"><span class="event-dot ' + cls + '"></span></div>' +
        '<div class="event-body">' +
          '<span class="event-desc">' + esc(ev.description) + featureTag + '</span>' +
        '</div>' +
      '</div>';
    }

    /* ===== Load timeline events ===== */
    function loadTimeline(page, append) {
      var container = document.getElementById('timeline-container');
      var loadingEl = document.getElementById('loading');

      if (!append) {
        container.innerHTML = '<div class="loading-indicator" id="loading">Loading...</div>';
      } else {
        /* remove old load-more button or loading */
        var oldBtn = document.getElementById('load-more-btn');
        if (oldBtn) oldBtn.parentNode.parentNode.removeChild(oldBtn.parentNode);
      }

      var url = API_BASE + '/api/timeline?page=' + page + '&per_page=' + perPage;
      if (selectedFeatureId) {
        url += '&feature_id=' + encodeURIComponent(selectedFeatureId);
      }

      fetchJSON(url, function(err, data) {
        if (err) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9888;</div><div class="empty-state-text">Failed to load data</div></div>';
          return;
        }

        var items = data.items || [];
        totalEvents = data.total || 0;
        currentPage = page;

        /* Update count */
        document.getElementById('event-count').textContent = totalEvents + ' events';

        var html = '';
        if (!append) html = '';

        for (var i = 0; i < items.length; i++) {
          html += renderEvent(items[i]);
        }

        /* Check if more pages */
        var loadedCount = page * perPage;
        var hasMore = loadedCount < totalEvents;

        if (hasMore) {
          html += '<div class="load-more-wrap" id="load-more-wrap">' +
            '<button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load more</button>' +
          '</div>';
        }

        if (append) {
          container.insertAdjacentHTML('beforeend', html);
        } else {
          if (items.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128466;</div><div class="empty-state-text">No events yet</div></div>';
          } else {
            container.innerHTML = html;
          }
        }
      });
    }

    /* ===== Load more (next page) ===== */
    function loadMore() {
      loadTimeline(currentPage + 1, true);
    }

    /* ===== Select feature filter ===== */
    function selectFeature(featureId) {
      selectedFeatureId = featureId;

      /* Update active state */
      var items = document.querySelectorAll('.feature-item');
      for (var i = 0; i < items.length; i++) {
        var id = items[i].getAttribute('data-feature-id');
        if (id === featureId) {
          items[i].classList.add('active');
        } else {
          items[i].classList.remove('active');
        }
      }

      /* Reload from page 1 */
      loadTimeline(1, false);
    }

    /* ===== Init: load features, then timeline ===== */
    function init() {
      fetchJSON(API_BASE + '/api/features', function(err, data) {
        if (err || !data) {
          /* No features yet, just load timeline */
          loadTimeline(1, false);
          return;
        }

        features = data;
        var listEl = document.getElementById('feature-list');
        var html = '<div class="feature-item active" data-feature-id="" onclick="selectFeature(\'\')">' +
          '<span class="feature-dot"></span>' +
          '<span class="feature-name">All</span>' +
        '</div>';

        for (var i = 0; i < data.length; i++) {
          var f = data[i];
          html += '<div class="feature-item" data-feature-id="' + esc(f.id) + '" onclick="selectFeature(\'' + esc(f.id) + '\')">' +
            '<span class="feature-dot"></span>' +
            '<span class="feature-name">' + esc(f.name || f.id) + '</span>' +
          '</div>';
        }

        listEl.innerHTML = html;
        loadTimeline(1, false);
      });
    }

    init();
  </script>
</body>
</html>
