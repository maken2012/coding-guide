<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-number.total { color: var(--text); }
    .stat-number.pending { color: var(--primary); }
    .stat-number.approved { color: var(--success); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* Section title */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Feature list */
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .feature-item {
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      padding: 10px 12px;
    }

    .feature-item:hover {
      background: var(--bg);
    }

    .feature-item.active {
      background: var(--bg);
      border-color: var(--primary);
    }

    .feature-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .status-badge.draft { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .status-badge.pending_review { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .status-badge.approved { background: rgba(34,197,94,0.2); color: #22c55e; }
    .status-badge.rejected { background: rgba(239,68,68,0.2); color: #ef4444; }
    .status-badge.implementing { background: rgba(245,158,11,0.2); color: #f59e0b; }

    /* Decision summary toggle */
    .decision-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      cursor: pointer;
      user-select: none;
    }

    .decision-toggle:hover {
      color: var(--text);
    }

    .decision-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .decision-toggle .arrow.open {
      transform: rotate(90deg);
    }

    .decision-list {
      margin-top: 6px;
      padding-left: 12px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .decision-list .decision-item {
      padding: 1px 0;
    }

    .decision-list .decision-item .check {
      color: var(--success);
      margin-right: 4px;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 20px;
      margin-bottom: 4px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border);
    }

    .timeline-entry {
      position: relative;
      padding-bottom: 14px;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--surface);
    }

    .timeline-entry:last-child {
      padding-bottom: 0;
    }

    .timeline-date {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .timeline-text {
      font-size: 13px;
      line-height: 1.4;
    }

    .timeline-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
    }

    .timeline-link:hover {
      text-decoration: underline;
    }

    /* ===== Main content ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      min-height: 56px;
    }

    .content-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .phase-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--primary);
      color: #fff;
      letter-spacing: 0.5px;
    }

    .content-body {
      flex: 1;
      position: relative;
    }

    .content-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Welcome placeholder */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .welcome h3 {
      font-size: 20px;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* Approved card */
    .approved-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
    }

    .approved-card .approved-icon {
      font-size: 48px;
      color: var(--success);
      margin-bottom: 16px;
    }

    .approved-card h3 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .approved-card .approved-label {
      font-size: 16px;
      color: var(--success);
      font-weight: 600;
      margin-bottom: 24px;
    }

    .approved-card .decision-rows {
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 24px;
      max-width: 500px;
      width: 100%;
    }

    .approved-card .decision-rows .phase-group-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    .approved-card .decision-rows .phase-group-title:first-child {
      margin-top: 0;
    }

    .approved-card .decision-rows .decision-row {
      font-size: 13px;
      padding: 3px 0;
      color: var(--text);
    }

    .approved-card .decision-rows .decision-row .row-key {
      color: var(--text-muted);
    }

    .approved-card .decision-rows .decision-row .row-value {
      color: var(--text);
      font-weight: 500;
    }

    /* ===== Review bar ===== */
    .review-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-bar .feedback-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .review-bar .feedback-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .review-bar .feedback-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .btn-approve { background: var(--success); color: #fff; }
    .btn-reject { background: var(--danger); color: #fff; }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      animation: toast-in 0.3s ease-out;
      max-width: 360px;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #000; }
    .toast.info { background: var(--primary); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-12px); }
    }

    /* Loading spinner */
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Feature Dashboard</h1>
      <p>功能开发看板</p>
    </div>
    <div class="sidebar-content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number total" id="statTotal">-</div>
          <div class="stat-label">功能总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number pending" id="statPending">-</div>
          <div class="stat-label">待审核</div>
        </div>
        <div class="stat-card">
          <div class="stat-number approved" id="statApproved">-</div>
          <div class="stat-label">已通过</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Feature list -->
      <div class="section-title">功能列表</div>
      <div class="feature-list" id="featureList">
        <div style="color: var(--text-muted); font-size: 13px;"><span class="loading-spinner"></span>加载中...</div>
      </div>

      <div class="divider"></div>

      <!-- Timeline -->
      <div class="section-title">近期动态</div>
      <div class="timeline" id="timeline">
        <div style="color: var(--text-muted); font-size: 13px;"><span class="loading-spinner"></span>加载中...</div>
      </div>
      <a class="timeline-link" href="/timeline" target="_blank">查看完整时间线 &rarr;</a>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="content-header" id="contentHeader">
      <h2 id="contentTitle">Dashboard</h2>
      <span class="phase-badge" id="contentPhase" style="display:none;"></span>
    </div>
    <div class="content-body" id="contentBody">
      <div class="welcome" id="welcomePlaceholder">
        <div class="welcome-icon">&#9776;</div>
        <h3>欢迎使用功能看板</h3>
        <p>从左侧选择一个功能查看详情和当前阶段文档。</p>
      </div>
      <iframe id="contentFrame" style="display:none;"></iframe>
      <div class="approved-card" id="approvedCard" style="display:none;"></div>
    </div>
    <div class="review-bar" id="reviewBar" style="display:none;">
      <input type="text" class="feedback-input" id="feedbackInput" placeholder="输入审核反馈...">
      <button class="btn btn-approve" onclick="submitVerdict('approved')">通过 ✓</button>
      <button class="btn btn-reject" onclick="submitVerdict('rejected')">驳回 ✗</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  var API_BASE = window.location.origin;
  var selectedFeatureId = null;
  var featuresCache = [];
  var decisionsCache = {};
  var phasesCache = {};

  /* Status labels in Chinese */
  var STATUS_LABELS = {
    draft: '草稿',
    pending_review: '待审核',
    approved: '已通过',
    rejected: '已驳回',
    implementing: '进行中'
  };

  /* ===== Initialization ===== */
  async function init() {
    await loadFeatures();
    await loadTimeline();
  }

  /* ===== Load features from API ===== */
  async function loadFeatures() {
    try {
      var resp = await fetch(API_BASE + '/api/features');
      if (!resp.ok) throw new Error('Failed to fetch features');
      featuresCache = await resp.json();
      renderStats(featuresCache);
      renderFeatureList(featuresCache);
    } catch (e) {
      console.error('Failed to load features:', e);
      showToast('无法加载功能列表', 'error');
      document.getElementById('featureList').innerHTML =
        '<div style="color: var(--danger); font-size: 13px;">加载失败</div>';
    }
  }

  /* ===== Load timeline from API ===== */
  async function loadTimeline() {
    try {
      var resp = await fetch(API_BASE + '/api/timeline?limit=10');
      if (!resp.ok) throw new Error('Failed to fetch timeline');
      var timeline = await resp.json();
      renderTimeline(timeline);
    } catch (e) {
      console.error('Failed to load timeline:', e);
      document.getElementById('timeline').innerHTML =
        '<div style="color: var(--danger); font-size: 13px;">加载失败</div>';
    }
  }

  /* ===== Render stat cards ===== */
  function renderStats(features) {
    document.getElementById('statTotal').textContent = features.length;
    document.getElementById('statPending').textContent =
      features.filter(function(f) { return f.status === 'pending_review'; }).length;
    document.getElementById('statApproved').textContent =
      features.filter(function(f) { return f.status === 'approved'; }).length;
  }

  /* ===== Render feature list ===== */
  function renderFeatureList(features) {
    var container = document.getElementById('featureList');
    container.innerHTML = '';

    if (features.length === 0) {
      container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px;">暂无功能</div>';
      return;
    }

    features.forEach(function(feature) {
      var item = document.createElement('div');
      item.className = 'feature-item';
      item.setAttribute('data-feature-id', feature.id);
      if (selectedFeatureId === feature.id) {
        item.classList.add('active');
      }
      item.onclick = function() { selectFeature(feature.id); };

      var html = '<div class="feature-row">' +
        '<span class="feature-name">' + escapeHtml(feature.name) + '</span>' +
        '<span class="status-badge ' + feature.status + '">' + STATUS_LABEL(feature.status) + '</span>' +
        '</div>';

      /* Decision toggle */
      html += '<div class="decision-toggle" data-decision-toggle="' + feature.id + '" onclick="event.stopPropagation(); toggleDecisions(\'' + feature.id + '\')">' +
        '<span class="arrow" id="arrow-' + feature.id + '">&#9654;</span>' +
        ' <span>决策记录</span>' +
        '</div>';

      html += '<div class="decision-list" id="decisions-' + feature.id + '" style="display:none;"></div>';

      item.innerHTML = html;
      container.appendChild(item);
    });
  }

  /* ===== Toggle decision summary under feature ===== */
  function toggleDecisions(featureId) {
    var el = document.getElementById('decisions-' + featureId);
    var arrow = document.getElementById('arrow-' + featureId);
    if (!el) return;

    if (el.style.display === 'none') {
      el.style.display = 'block';
      if (arrow) arrow.classList.add('open');
      loadDecisionsForFeature(featureId);
    } else {
      el.style.display = 'none';
      if (arrow) arrow.classList.remove('open');
    }
  }

  /* ===== Load decisions for a feature ===== */
  async function loadDecisionsForFeature(featureId) {
    var el = document.getElementById('decisions-' + featureId);
    if (!el) return;
    el.innerHTML = '<span class="loading-spinner"></span> 加载中...';

    try {
      var resp = await fetch(API_BASE + '/api/decisions/' + featureId);
      if (!resp.ok) throw new Error('Failed');
      var data = await resp.json();
      decisionsCache[featureId] = data;
      renderDecisionList(el, data);
    } catch (e) {
      el.innerHTML = '<span style="color: var(--text-muted);">暂无决策</span>';
    }
  }

  /* ===== Render decision list inside sidebar ===== */
  function renderDecisionList(container, data) {
    var html = '';
    var hasDecisions = false;

    if (data && typeof data === 'object') {
      var phases = Object.keys(data);
      phases.forEach(function(phase) {
        var decisions = data[phase];
        if (Array.isArray(decisions) && decisions.length > 0) {
          hasDecisions = true;
          decisions.forEach(function(d) {
            var key = d.id || d.key || '?';
            var value = '';
            if (d.selected) {
              value = Array.isArray(d.selected) ? d.selected.join(', ') : String(d.selected);
            } else if (d.note) {
              value = d.note;
            }
            if (value) {
              html += '<div class="decision-item"><span class="check">&#10003;</span>' +
                escapeHtml(key) + ': ' + escapeHtml(value) + '</div>';
            }
          });
        }
      });
    }

    if (!hasDecisions) {
      html = '<span style="color: var(--text-muted);">暂无决策</span>';
    }
    container.innerHTML = html;
  }

  /* ===== Render timeline ===== */
  function renderTimeline(events) {
    var container = document.getElementById('timeline');
    container.innerHTML = '';

    if (!events || events.length === 0) {
      container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px;">暂无动态</div>';
      return;
    }

    events.forEach(function(entry) {
      var div = document.createElement('div');
      div.className = 'timeline-entry';
      div.innerHTML = '<div class="timeline-date">' + escapeHtml(entry.date || '') + '</div>' +
        '<div class="timeline-text">' + escapeHtml(entry.event || entry.description || '') + '</div>';
      container.appendChild(div);
    });
  }

  /* ===== Select a feature ===== */
  async function selectFeature(featureId) {
    selectedFeatureId = featureId;

    /* Update sidebar active state */
    document.querySelectorAll('.feature-item').forEach(function(el) {
      el.classList.toggle('active', el.getAttribute('data-feature-id') === featureId);
    });

    var feature = featuresCache.find(function(f) { return f.id === featureId; });
    if (!feature) return;

    /* Update header */
    document.getElementById('contentTitle').textContent = feature.name;
    var phaseEl = document.getElementById('contentPhase');
    if (feature.phase) {
      phaseEl.textContent = feature.phase;
      phaseEl.style.display = '';
    } else {
      phaseEl.style.display = 'none';
    }

    /* Load phases from API */
    try {
      var resp = await fetch(API_BASE + '/api/phases/' + featureId);
      if (resp.ok) {
        phasesCache[featureId] = await resp.json();
      }
    } catch (e) {
      console.error('Failed to load phases:', e);
    }

    var phases = phasesCache[featureId] || {};

    /* Determine what to show based on status */
    if (feature.status === 'approved') {
      showApprovedCard(feature);
    } else if (feature.status === 'pending_review' || feature.status === 'rejected') {
      if (feature.html_path || feature.artifact_path) {
        showIframe(feature, true);
      } else {
        showWelcome(feature.name + ' — 无可用文档');
      }
    } else {
      /* draft, implementing, or unknown */
      if (feature.html_path || feature.artifact_path) {
        showIframe(feature, false);
      } else {
        showWelcome(feature.name + ' — 尚未开始任何阶段');
      }
    }
  }

  /* ===== Show iframe content ===== */
  function showIframe(feature, showReview) {
    hideAllContent();
    var frame = document.getElementById('contentFrame');
    var reviewBar = document.getElementById('reviewBar');

    var artifactPath = feature.html_path || feature.artifact_path || '';
    var src = '/specs/' + feature.id + '/' + artifactPath + '?feature_id=' + feature.id;

    frame.src = src;
    frame.style.display = 'block';
    reviewBar.style.display = showReview ? 'flex' : 'none';
  }

  /* ===== Show approved card ===== */
  function showApprovedCard(feature) {
    hideAllContent();
    var card = document.getElementById('approvedCard');
    var reviewBar = document.getElementById('reviewBar');
    reviewBar.style.display = 'none';

    /* Build decision rows */
    var decisionsHtml = '';
    var decisions = decisionsCache[feature.id];
    if (decisions && typeof decisions === 'object') {
      var phases = Object.keys(decisions);
      phases.forEach(function(phase) {
        var items = decisions[phase];
        if (Array.isArray(items) && items.length > 0) {
          decisionsHtml += '<div class="phase-group-title">' + escapeHtml(phase) + '</div>';
          items.forEach(function(d) {
            var key = d.id || d.key || '?';
            var value = '';
            if (d.selected) {
              value = Array.isArray(d.selected) ? d.selected.join(', ') : String(d.selected);
            } else if (d.note) {
              value = d.note;
            }
            if (value) {
              decisionsHtml += '<div class="decision-row">' +
                '<span class="row-key">' + escapeHtml(key) + ':</span> ' +
                '<span class="row-value">' + escapeHtml(value) + '</span></div>';
            }
          });
        }
      });
    }

    if (!decisionsHtml) {
      decisionsHtml = '<div style="color: var(--text-muted); font-size: 13px;">暂无决策记录</div>';
    }

    card.innerHTML =
      '<div class="approved-icon">&#10003;</div>' +
      '<h3>' + escapeHtml(feature.name) + '</h3>' +
      '<div class="approved-label">&#10003; 已通过</div>' +
      '<div class="decision-rows">' + decisionsHtml + '</div>';

    card.style.display = 'flex';
  }

  /* ===== Show welcome placeholder ===== */
  function showWelcome(message) {
    hideAllContent();
    var welcome = document.getElementById('welcomePlaceholder');
    var reviewBar = document.getElementById('reviewBar');
    reviewBar.style.display = 'none';
    welcome.style.display = 'flex';
    if (message) {
      welcome.querySelector('p').textContent = message;
    }
  }

  /* ===== Hide all content panels ===== */
  function hideAllContent() {
    document.getElementById('welcomePlaceholder').style.display = 'none';
    document.getElementById('contentFrame').style.display = 'none';
    document.getElementById('contentFrame').src = '';
    document.getElementById('approvedCard').style.display = 'none';
  }

  /* ===== Submit verdict ===== */
  async function submitVerdict(verdict) {
    var feedback = document.getElementById('feedbackInput').value.trim();
    var data = {
      feature_id: selectedFeatureId,
      verdict: verdict,
      feedback: feedback,
      timestamp: new Date().toLocaleString('sv-SE')
    };
    try {
      var resp = await fetch(API_BASE + '/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (resp.ok) {
        showToast(verdict === 'approved' ? '已通过' : '已驳回', verdict === 'approved' ? 'success' : 'error');
        await loadFeatures();
        await loadTimeline();
        if (selectedFeatureId) await selectFeature(selectedFeatureId);
      } else {
        showToast('提交失败', 'error');
      }
    } catch (e) {
      showToast('无法连接服务器', 'error');
    }
  }

  /* ===== Toast notification ===== */
  function showToast(msg, type) {
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = msg;
    container.appendChild(toast);

    setTimeout(function() {
      toast.style.animation = 'toast-out 0.3s ease-in forwards';
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }, 3500);
  }

  /* ===== Status label helper ===== */
  function STATUS_LABEL(status) {
    return STATUS_LABELS[status] || status;
  }

  /* ===== Escape HTML ===== */
  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ===== Start ===== */
  init();
</script>

</body>
</html>
